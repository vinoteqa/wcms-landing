id: "features"

content:
  - title: "Wähle deine Weine zwischen 700.000+ verfügbaren Etiketten"
    text: "Unsere umfangreiche Weindatenbank mit detaillierten Informationen rund um Herkunftsländer, Stile, Denominationen, Rebsorten und mehr erlaubt es uns, die Verwaltung deines Weinkellers sowie deiner Weinkarten zu automatisieren. Vinoteqa hebt den Wert jeder Weinflasche in deinem Weinkeller hervor."
    image:
      src: "/images/wines.png"
      title: "Millionen Weine auf einen Klick"

  - title: "Inventarmanagement leicht gemacht"
    text: "
    - Erstelle deine Bestellungen und Verkäufe in Echtzeit für lückenlose Inventur;

    - Vereinfache die Verwaltung des Weinkellers durch automatische Archivierung ausverkaufter Weine;
    
    - Ein neuer Ansatz, deine exquisite Weinkollektion zu präsentieren."
    image: 
      src: "/images/inventory.png"
      title: "Vinoteqa Weininventar"

  - title: "Erstelle und Personalisiere deine Weinkarte"
    text: "Personalisiere den Stil und das Format deiner **digitalen** und **druckbaren** Weinkarte ein einziges Mal, um zukünftig alles automatisch zu aktualisiert - basierend auf deinem Inventar. Spare wertvolle Zeit und garantiere deinen Gästen aktuellste Weinkarten."
    image:
      src: "/images/wine-list.png"
      title: "Automatische Erstellung von Weinkarten"



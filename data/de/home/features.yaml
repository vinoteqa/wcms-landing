id: "features"

content:
  - title: "Wähle deine Weine in zwischen 700.000+ verfügbaren Etiketten"
    text: "Unsere umfangreiche Weindatenbank mit detaillierten Informationen zu Herkunftsländern, Stil, Denominationen und Trauben  erlaubt es uns, die Verwaltung deines Weinkellers und deiner Weinkarten zu automatisieren. Vinoteqa drückt den Wert jedes Weins in deinem Weinkeller aus."
    image:
      src: "/images/wines.png"
      title: "Millionen von Weine zur Hand"

  - title: "Verwalte dein Inventar mühelos"
    text: "
    - Erstelle Bestellungen und Verkäufe in Echtzeit für eine lückenlose Inventarkontrolle;

    - Ausverkaufte Weine werden automatisch archiviert, um Verwaltung zu vereinfachen;
    
    - Ein neuer Weg, deine exquisite Weinkollektion zu präsentieren."
    image: 
      src: "/images/inventory.png"
      title: "Vinoteqa Weininventar"

  - title: "Effortlessly Generate and Personalize Your Wine List"
    text: "Personalisiere den Stil und das Format deiner **digitalen** und **druckbaren** Weinkarte einmalig, damit zukünftig alles automatisch aktualisiert wird - basierend auf deinem Inventar. Spare wertvolle Zeit und garantiere deinen Gästen aktuellste Weinkarten."
    image:
      src: "/images/wine-list.png"
      title: "Automatische Erstellung von Weinkarten"


